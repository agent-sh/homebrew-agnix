name: Notify Tap on Release

# Install this workflow in agent-sh/agnix (the main repo).
# It dispatches to the tap repo when a new release is published.
# Requires a PAT secret named TAP_DISPATCH_TOKEN with repo scope.

on:
  release:
    types: [published]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch to tap
        env:
          GH_TOKEN: ${{ secrets.TAP_DISPATCH_TOKEN }}
        run: |
          gh api repos/agent-sh/homebrew-agnix/dispatches \
            --method POST \
            -f event_type=release-published \
            -f "client_payload[tag]=${{ github.event.release.tag_name }}"
